<div id="auth-section" class="max-w-md w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50 mx-auto mt-20">
    <h2 class="text-3xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-8">Welcome</h2>
    
    <form id="login-form" class="flex flex-col gap-4">
        <input type="email" id="login-email" placeholder="Email" class="p-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:outline-none focus:border-emerald-500" required>
        <input type="password" id="login-password" placeholder="Password" class="p-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:outline-none focus:border-emerald-500" required>
        <button type="submit" class="bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3 rounded-xl transition-all">Log In</button>
    </form>

    <form id="register-form" class="flex flex-col gap-4 hidden">
        <input type="text" id="reg-name" placeholder="Full Name" class="p-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:outline-none focus:border-emerald-500" required>
        <input type="email" id="reg-email" placeholder="Email" class="p-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:outline-none focus:border-emerald-500" required>
        <input type="password" id="reg-password" placeholder="Password (Min 8 chars, 1 Upp, 1 Num)" class="p-3 rounded-xl bg-slate-900 border border-slate-700 text-white focus:outline-none focus:border-emerald-500" required>
        <button type="submit" class="bg-cyan-500 hover:bg-cyan-400 text-white font-bold py-3 rounded-xl transition-all">Register</button>
    </form>

    <div class="text-center mt-6">
        <button id="toggle-auth" class="text-slate-400 hover:text-white text-sm transition-colors">Need an account? Register</button>
    </div>
</div>

<div id="booking-section" class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50 hidden mt-10 mx-auto">
    <div class="flex justify-end mb-4">
        <button id="logout-btn" class="text-rose-400 hover:text-rose-300 border border-rose-500/30 px-4 py-2 rounded-lg transition-all">Logout</button>
    </div>
    
    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 tracking-tight">ChaiCode Cinema</h1>
    </div>

    <div class="flex justify-center">
        <div class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner">
            <table id="tbl" class="border-separate border-spacing-4 mx-auto"></table>
        </div>
    </div>
</div>


    <script>

const authsection = document.getElementById('auth-section')
const bookingSection = document.getElementById('booking-section')
const toggleBtn = document.getElementById('toggle-auth')
let isLogin = true

async function checkAuth(){
  try{
    const res= await fetch('/api/auth/me')
    if(res.ok){
      authsection.classList.add('hidden')
      bookingSection.classList.remove('hidden')
      run()
    } else { 
      authsection.classList.remove('hidden')
      bookingSection.classList.add('hidden')
    }
  } catch (error){
    console.error("Authentication Failed")
  }
}

toggleBtn.addEventListener('click',()=>{
  isLogin= !isLogin
  document.getElementById('login-form').classList.toggle('hidden', !isLogin)
  document.getElementById('register-form').classList.toggle('hidden', isLogin)
  toggleBtn.innerText = isLogin? "Need an Account ? Register" : "Already Have An Account ? Log In"

})

document.getElementById('login-form').addEventListener('submit', async(e)=>{
  e.preventDefault()
  const email = document.getElementById('login-email').value
  const pass = document.getElementById('login-password').value 

  const res = await fetch('/api/auth/login',{
    method:'POST',
    headers:{ 'Content-Type': 'application/json'},
    body: JSON.stringify({email:email,password:pass})
  })

  if(res.ok) {
    checkAuth()
  } else {
    const data = await res.json()
    alert("Log In Failed" + (data.error || data.message))
  }
})

document.getElementById('register-form').addEventListener('submit', async(e)=>{
  e.preventDefault()
  const name = document.getElementById('reg-name').value
  const email = document.getElementById('reg-email').value
  const pass = document.getElementById('reg-password').value

  const res= await fetch('/api/auth/register',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ name:name,email:email,password:pass})
  })

  if(res.ok || res.status===201){
    alert('Registration Successful✅ Please Log In🌹')
    toggleBtn.click() //switching back to login view
  } else {
    const data = await res.json()
    alert('Registration Failed ' +(data.error || data.message))
  }

})

document.getElementById('logout-btn').addEventListener('click', async()=>{
  await fetch('/api/auth/logout', {
    method:'POST'
  })

  checkAuth() //hiding cinema and showing login again
})

checkAuth()





      async function run() {
        const tbl = document.getElementById("tbl");
        const res = await fetch("/seats");
        const resarray = await res.json();
        const j = resarray.sort((a, b) => a.id - b.id);
        let tr;
        for (let i = 0; i < j.length; i++) {
          if (i % 8 === 0) tr = document.createElement("tr");

          const td = document.createElement("td");

          // Base aesthetic classes - added 'relative group' for tooltip positioning
          const baseClasses =
            "w-32 h-32 rounded-2xl text-center align-middle text-2xl font-bold transition-all duration-300 select-none relative group";

          if (j[i].isbooked) {
            td.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
            td.innerHTML = `
                    <span class="relative z-10">${j[i].id}</span>
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                        Booked by: <span class="font-bold text-white ml-1">${j[i].name}</span>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                    </div>
                `;
          } else {
            td.className = `${baseClasses} bg-emerald-500 text-white border-2 border-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.3)] cursor-pointer hover:bg-emerald-400 hover:-translate-y-1.5 hover:shadow-[0_10px_25px_rgba(16,185,129,0.5)] active:scale-95 active:shadow-[0_0_10px_rgba(16,185,129,0.3)]`;
            td.innerHTML = `<span class="relative z-10">${j[i].id}</span>`;
          }

          td.addEventListener("click", async function (e) {
            const currentTd = e.currentTarget;
            if (currentTd.classList.contains("cursor-not-allowed")) {
              return; // Seat is already taken
            }

            try {
              const id = j[i].id; // Safe from loop closure
              const name = prompt("Enter your name");
              if (!name) return;



              



              const res = await fetch(`/${id}/${name}`, { method: "PUT" });
              const data = await res.json();

              if (data.error) {
                if (res.status === 401) {
                    alert("Please login or authenticate first!");
                } else {
                      alert("FAILED! " + data.error);
                 }
              } else {
                alert("Booked successfully!");
                // Visually transition to booked state upon success
                currentTd.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
                currentTd.innerHTML = `
                            <span class="relative z-10">${id}</span>
                            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                                Booked by: <span class="font-bold text-white ml-1">${name}</span>
                                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                            </div>
                        `;
              }
            } catch (ex) {
              alert("error booking " + ex);
            }
          });
          tr.appendChild(td);
          tbl.appendChild(tr);
        }
      }
      // run();
    </script>
